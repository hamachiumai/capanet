<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VisionLink Glass</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: white;
    color: black;
}

header {
    background: red;
    color: white;
    text-align: center;
    padding: 60px 20px;
}

header h1 {
    font-size: 2.5em;
}

.catch {
    font-size: 1.5em;
    font-weight: bold;
    margin: 20px 0;
}

.price {
    font-size: 3em;
    color: yellow;
    font-weight: bold;
}

.tax {
    font-size: 1em;
}

.button {
    display: inline-block;
    background: yellow;
    color: black;
    padding: 20px 40px;
    font-size: 1.5em;
    font-weight: bold;
    border-radius: 10px;
    text-decoration: none;
    margin-top: 20px;
}

.section {
    padding: 40px;
    text-align: center;
}

.box {
    background: #f3f3f3;
    margin: 20px auto;
    padding: 20px;
    width: 80%;
    border-radius: 10px;
}

.big {
    font-size: 2em;
    color: red;
    font-weight: bold;
}

.tel {
    margin-top: 15px;
    font-size: 1.3em;
    color: yellow;
    font-weight: bold;
}

.timer {
    font-size: 2em;
    color: yellow;
    margin-top: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<header>
    <h1>VisionLink Glass</h1>

    <div class="catch">
        ＼聞こえなくても会話できる！？／
    </div>

    <div class="big">
        今だけ限定価格！！
    </div>

    <div class="price">
        ¥12,980
    </div>
    <div class="tax">税込</div>

    <a href="https://example.com" class="button">
        ▶ 今すぐ注文する！
    </a>

    <p class="tel">
        📞 今から30分以内のお電話注文で送料無料！！
    </p>

    <div class="timer" id="timer">
        残り 30:00
    </div>
</header>

<section class="section">
    <h2>驚きの機能！</h2>

    <div class="box">🎤 会話がリアルタイムで字幕表示！</div>
    <div class="box">🎥 録音・録画であとから確認！</div>
    <div class="box">🌍 自動翻訳で海外でも安心！</div>
    <div class="box">💧 防水＆割れないレンズ！</div>
    <div class="box">🔋 長時間バッテリー！</div>
</section>

<section class="section">
    <div class="big">残りわずか！！</div>
    <p>※在庫がなくなり次第終了です</p>
</section>

<script>
let time = 30 * 60;

function updateTimer() {
    let minutes = Math.floor(time / 60);
    let seconds = time % 60;

    seconds = seconds < 10 ? "0" + seconds : seconds;

    document.getElementById("timer").textContent =
        "残り " + minutes + ":" + seconds;

    if (time > 0) {
        time--;
    } else {
        // ホラー演出
        document.body.classList.add("horror");

        document.body.innerHTML = `
            <div class="horror-message">
                買わなかったこと後悔しろよ......
            </div>
        `;
    }
}

setInterval(updateTimer, 1000);
</script>

</body>
</html>
